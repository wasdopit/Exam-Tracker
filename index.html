<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Exam Tracker"/>
  <meta name="theme-color" content="#1a1a2e"/>
  <title>Exam Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      --ink: #1a1a2e;
      --ink-mid: #3d3d5c;
      --ink-light: #7b7b9d;
      --paper: #faf9f6;
      --paper-warm: #f2efe8;
      --paper-ruled: #ede9df;
      --accent: #c84b31;
      --accent-warm: #e8643f;
      --accent-light: #f5e6e2;
      --teal: #2d6a6a;
      --teal-light: #e0f0f0;
      --gold: #b8962e;
      --gold-light: #faf3dd;
      --check-green: #2d7a4f;
      --check-green-light: #e0f5ea;
      --border: #d6d1c4;
      --shadow: rgba(26,26,46,0.08);
      --safe-top: env(safe-area-inset-top, 44px);
      --safe-bottom: env(safe-area-inset-bottom, 20px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'DM Sans', sans-serif;
      background: var(--paper);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ============ LAYOUT ============ */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ============ STATUS BAR SPACER ============ */
    .status-bar {
      height: var(--safe-top);
      background: var(--ink);
      flex-shrink: 0;
    }

    /* ============ HEADER ============ */
    .app-header {
      background: var(--ink);
      color: var(--paper);
      padding: 0 1rem;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      position: relative;
    }
    .header-left { display: flex; align-items: center; gap: 0.6rem; flex: 1; min-width: 0; }
    .header-right { display: flex; align-items: center; gap: 0.5rem; }

    .app-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-title span { color: var(--accent-warm); font-style: italic; }

    .btn-back {
      background: none;
      border: none;
      color: var(--accent-warm);
      font-size: 1rem;
      padding: 0.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.2rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .btn-header-icon {
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      width: 34px; height: 34px;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .btn-header-icon:active { background: rgba(255,255,255,0.25); }

    /* ============ SCROLLABLE CONTENT ============ */
    .screen {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: none;
    }
    .screen.active { display: block; }

    /* ============ BOTTOM NAV ============ */
    .bottom-nav {
      flex-shrink: 0;
      background: var(--ink);
      display: flex;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-bottom: var(--safe-bottom);
    }
    .nav-tab {
      flex: 1;
      background: none;
      border: none;
      color: var(--ink-light);
      padding: 0.6rem 0 0.5rem;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
      transition: color 0.15s;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-tab.active { color: var(--accent-warm); }
    .nav-tab .nav-icon { font-size: 1.25rem; line-height: 1; }
    .nav-tab .nav-label { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

    /* ============ COURSES SCREEN ============ */
    .course-list { padding: 1rem 0; }

    .course-card {
      margin: 0 1rem 0.75rem;
      background: white;
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      overflow: hidden;
    }
    .course-card-body {
      padding: 1rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .course-card-body:active { background: var(--paper-warm); }

    .course-badge {
      background: var(--ink);
      color: white;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      font-weight: 500;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      flex-shrink: 0;
      letter-spacing: 0.03em;
      max-width: 60px;
      text-align: center;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .course-info { flex: 1; min-width: 0; }
    .course-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--ink);
      line-height: 1.3;
      margin-bottom: 0.15rem;
    }
    .course-meta {
      font-size: 0.72rem;
      color: var(--ink-light);
      font-family: 'DM Mono', monospace;
    }
    .course-chevron { color: var(--ink-light); font-size: 0.8rem; flex-shrink: 0; }

    .course-card-progress {
      padding: 0.6rem 1.1rem;
      border-top: 1px solid var(--border);
      background: var(--paper-warm);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .course-card-actions {
      padding: 0.55rem 0.75rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.5rem;
    }
    .btn-card-action {
      flex: 1;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink-mid);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
    }
    .btn-card-action:active { background: var(--paper-warm); }
    .btn-card-action.danger { color: var(--accent); border-color: #f5c0b0; }
    .btn-card-action.danger:active { background: var(--accent-light); }

    .mini-progress-bar-wrap {
      flex: 1;
      background: var(--border);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
    }
    .mini-progress-bar {
      height: 100%;
      background: var(--check-green);
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .mini-progress-text {
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: var(--ink-light);
      flex-shrink: 0;
    }

    .empty-courses {
      margin: 3rem 2rem;
      text-align: center;
    }
    .empty-courses .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
    .empty-courses h3 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--ink-mid);
      margin-bottom: 0.5rem;
    }
    .empty-courses p { color: var(--ink-light); font-size: 0.875rem; line-height: 1.6; }

    .fab {
      position: fixed;
      right: 1.25rem;
      bottom: calc(var(--safe-bottom) + 64px);
      width: 52px;
      height: 52px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 16px rgba(200,75,49,0.45);
      cursor: pointer;
      z-index: 50;
      transition: transform 0.15s, background 0.15s;
    }
    .fab:active { transform: scale(0.93); background: var(--accent-warm); }

    /* ============ COURSE DETAIL SCREEN ============ */
    .course-detail-header {
      background: linear-gradient(135deg, var(--ink) 0%, var(--ink-mid) 100%);
      color: white;
      padding: 1.25rem 1.25rem 1.5rem;
    }
    .course-detail-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.4rem;
      margin-bottom: 0.25rem;
      line-height: 1.25;
    }
    .course-detail-sub {
      font-size: 0.8rem;
      opacity: 0.6;
      font-family: 'DM Mono', monospace;
      margin-bottom: 1rem;
    }
    .stats-row {
      display: flex;
      gap: 0.75rem;
    }
    .stat-pill {
      background: rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 0.6rem 0.9rem;
      flex: 1;
      text-align: center;
    }
    .stat-pill-label { font-size: 0.65rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-pill-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.5rem;
      margin-top: 0.1rem;
    }
    .stat-pill-value.green { color: #7ee8a2; }

    .sections-container { padding: 1rem 1rem 5rem; }

    .section-block {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 0.75rem;
      overflow: hidden;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .section-head {
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      cursor: pointer;
      background: var(--paper-warm);
      -webkit-user-select: none;
      user-select: none;
    }
    .section-head:active { background: var(--paper-ruled); }
    .section-num {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      background: var(--ink);
      color: white;
      padding: 0.15rem 0.4rem;
      border-radius: 5px;
      flex-shrink: 0;
    }
    .section-name-text { font-weight: 600; font-size: 0.875rem; flex: 1; min-width: 0; line-height: 1.3; }
    .section-progress-mini { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
    .section-toggle { color: var(--ink-light); font-size: 0.7rem; flex-shrink: 0; }
    .section-actions-bar {
      display: flex;
      gap: 0.4rem;
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--paper-warm);
    }
    .btn-section-action {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-size: 0.7rem;
      color: var(--ink-light);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .btn-section-action:active { background: var(--paper-ruled); }
    .btn-section-action.danger { color: var(--accent); border-color: #f5c0b0; }

    .topic-list { }
    .topic-row {
      padding: 0.7rem 1rem 0.7rem 1.15rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid #f0ede6;
    }
    .topic-row:last-child { border-bottom: none; }
    .topic-name-text { flex: 1; font-size: 0.85rem; line-height: 1.35; color: var(--ink); }

    .year-pills { display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .year-pill {
      padding: 0.2rem 0.5rem;
      border-radius: 20px;
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      border: 1.5px solid var(--border);
      background: white;
      cursor: pointer;
      transition: all 0.12s;
      -webkit-user-select: none;
      user-select: none;
      min-width: 40px;
      text-align: center;
    }
    .year-pill:active { transform: scale(0.95); }
    .year-pill.checked {
      background: var(--check-green-light);
      border-color: var(--check-green);
      color: var(--check-green);
    }
    .year-pill.checked::before { content: '✓ '; }

    .add-topic-row {
      padding: 0.55rem 1rem 0.55rem 1.15rem;
      display: flex;
      gap: 0.5rem;
      background: #fdfcf9;
      border-top: 1px solid var(--border);
    }
    .add-topic-input {
      flex: 1;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 0.4rem 0.7rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      outline: none;
      background: white;
      color: var(--ink);
    }
    .add-topic-input:focus { border-color: var(--teal); }
    .btn-confirm-add {
      background: var(--teal);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0 0.9rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-confirm-add:active { background: #3a8a8a; }
    .btn-cancel-add {
      background: none;
      border: none;
      color: var(--ink-light);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 0.2rem;
    }

    /* ============ CHECKLIST SCREEN ============ */
    .checklist-header {
      padding: 1.25rem 1rem 0.75rem;
    }
    .checklist-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      margin-bottom: 0.25rem;
    }
    .checklist-sub {
      font-size: 0.78rem;
      color: var(--ink-light);
      font-family: 'DM Mono', monospace;
      margin-bottom: 1rem;
    }
    .stats-cards {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .stat-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.75rem;
      flex: 1;
      box-shadow: 0 1px 3px var(--shadow);
      text-align: center;
    }
    .stat-card-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-light); font-weight: 600; }
    .stat-card-value {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      color: var(--ink);
      margin-top: 0.1rem;
      line-height: 1;
    }
    .stat-card-value.green { color: var(--check-green); }

    .no-course-selected {
      margin: 3rem 1.5rem;
      text-align: center;
      color: var(--ink-light);
      font-size: 0.875rem;
      line-height: 1.6;
    }

    /* ============ IMPORT/EXPORT SCREEN ============ */
    .ie-screen {
      padding: 1.25rem 1rem 5rem;
    }
    .ie-section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1rem;
      color: var(--ink-mid);
      margin: 1.25rem 0 0.6rem;
    }
    .ie-section-title:first-child { margin-top: 0; }
    .ie-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 0.75rem;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .ie-row {
      padding: 0.9rem 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .ie-row:last-child { border-bottom: none; }
    .ie-row:active { background: var(--paper-warm); }
    .ie-row-icon { font-size: 1.25rem; flex-shrink: 0; width: 32px; text-align: center; }
    .ie-row-text { flex: 1; }
    .ie-row-title { font-weight: 600; font-size: 0.875rem; }
    .ie-row-desc { font-size: 0.75rem; color: var(--ink-light); margin-top: 0.1rem; }
    .ie-row-chevron { color: var(--ink-light); font-size: 0.8rem; }

    /* ============ MODALS ============ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26,26,46,0.6);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }
    .modal-sheet {
      background: white;
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 1.25rem calc(1.25rem + var(--safe-bottom));
      animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0.75rem auto 1rem;
    }
    .modal-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.2rem;
      margin-bottom: 1.25rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--ink-mid);
      margin-bottom: 0.4rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      color: var(--ink);
      background: var(--paper);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    .form-input:focus { border-color: var(--teal); }
    .form-hint { font-size: 0.76rem; color: var(--ink-light); margin-top: 0.35rem; }

    .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
    .btn {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--teal); color: white; }
    .btn-ghost { background: var(--paper-ruled); color: var(--ink-mid); }
    .btn-danger { background: var(--accent-light); color: var(--accent); }

    /* ============ TOAST ============ */
    .toast {
      position: fixed;
      bottom: calc(var(--safe-bottom) + 72px);
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: white;
      padding: 0.6rem 1.25rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 500;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.green { background: var(--check-green); }
    .toast.red { background: var(--accent); }

    /* ============ SCROLLBAR ============ */
    ::-webkit-scrollbar { display: none; }

    .course-detail-screen { padding-bottom: 5rem; }

    .add-section-btn {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0 1rem 1rem;
      padding: 0.75rem 1rem;
      background: var(--teal-light);
      border: 2px dashed var(--teal);
      border-radius: 12px;
      color: var(--teal);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      width: calc(100% - 2rem);
    }
    .add-section-btn:active { background: #c5e8e8; }

    .progress-bar-wrap {
      flex: 1;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      height: 4px;
      overflow: hidden;
      min-width: 50px;
    }
    .progress-bar {
      background: #7ee8a2;
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .progress-bar.dark {
      background: var(--check-green);
    }
    .progress-count {
      font-size: 0.68rem;
      font-family: 'DM Mono', monospace;
      color: rgba(255,255,255,0.6);
      flex-shrink: 0;
    }
    .progress-count.dark { color: var(--ink-light); }

    .checklist-no-sections {
      padding: 2rem 1rem;
      text-align: center;
      color: var(--ink-light);
      font-size: 0.85rem;
    }

    .import-textarea {
      width: 100%;
      height: 120px;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--ink);
      background: var(--paper);
      outline: none;
      resize: none;
      -webkit-appearance: none;
    }
    .import-textarea:focus { border-color: var(--teal); }

    /* ============ SHARED DATA BANNER ============ */
    .shared-banner {
      margin: 0.75rem 1rem 0;
      background: linear-gradient(135deg, var(--teal) 0%, #1a5252 100%);
      border-radius: 14px;
      padding: 0.9rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      box-shadow: 0 4px 16px rgba(45,106,106,0.3);
      animation: bannerIn 0.35s cubic-bezier(0.32,0.72,0,1);
    }
    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .shared-banner-icon { font-size: 1.5rem; flex-shrink: 0; }
    .shared-banner-text { flex: 1; min-width: 0; }
    .shared-banner-title { color: white; font-weight: 700; font-size: 0.875rem; margin-bottom: 0.15rem; }
    .shared-banner-sub { color: rgba(255,255,255,0.72); font-size: 0.72rem; font-family: 'DM Mono', monospace; }
    .shared-banner-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .btn-banner {
      padding: 0.45rem 0.75rem;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      white-space: nowrap;
    }
    .btn-banner:active { transform: scale(0.95); }
    .btn-banner-primary { background: white; color: var(--teal); }
    .btn-banner-ghost { background: rgba(255,255,255,0.18); color: white; }
    .btn-banner-dismiss {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      cursor: pointer;
      padding: 0.2rem;
      flex-shrink: 0;
      line-height: 1;
    }

    /* ============ SHARED DATA IE CARD ============ */
    .ie-shared-card {
      background: linear-gradient(135deg, #e8f5f5 0%, #d4eded 100%);
      border: 1.5px solid var(--teal);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 0.75rem;
      box-shadow: 0 2px 12px rgba(45,106,106,0.15);
    }
    .ie-shared-header {
      padding: 0.9rem 1.1rem 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .ie-shared-badge {
      background: var(--teal);
      color: white;
      font-size: 0.6rem;
      font-weight: 800;
      font-family: 'DM Mono', monospace;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .ie-shared-title { font-weight: 700; font-size: 0.875rem; color: var(--teal); flex: 1; }
    .ie-shared-meta { font-size: 0.72rem; color: var(--ink-light); font-family: 'DM Mono', monospace; padding: 0 1.1rem 0.75rem; }
    .ie-shared-actions { display: flex; gap: 0.5rem; padding: 0 1.1rem 0.9rem; }
    .btn-shared-action {
      flex: 1;
      padding: 0.6rem;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      transition: all 0.15s;
    }
    .btn-shared-action:active { transform: scale(0.96); }
    .btn-shared-primary { background: var(--teal); color: white; }
    .btn-shared-secondary { background: white; color: var(--teal); border: 1.5px solid var(--teal) !important; }
    .ie-shared-courses { padding: 0 1.1rem 0.9rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .ie-shared-course-chip {
      background: white;
      border: 1px solid rgba(45,106,106,0.3);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.7rem;
      font-family: 'DM Mono', monospace;
      color: var(--teal);
    }
  </style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script type="module">
const STORAGE_KEY = 'examTracker_v1';
const JSONBIN_API_KEY_STORAGE    = 'examTracker_jsonbinApiKey';
const JSONBIN_BIN_ID_STORAGE     = 'examTracker_jsonbinBinId';
const JSONBIN_SHORT_CODE_STORAGE = 'examTracker_shortCode';
const JSONBIN_BASE = 'https://api.jsonbin.io/v3';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : { courses: [] };
  } catch { return { courses: [] }; }
}
function saveData(d) { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); }
function uid() { return Math.random().toString(36).slice(2, 10); }

// ---- Storage helpers ----
function getSavedApiKey()    { return localStorage.getItem(JSONBIN_API_KEY_STORAGE)    || ''; }
function getSavedBinId()     { return localStorage.getItem(JSONBIN_BIN_ID_STORAGE)     || ''; }
function getSavedShortCode() { return localStorage.getItem(JSONBIN_SHORT_CODE_STORAGE) || ''; }
function saveApiKey(k)       { localStorage.setItem(JSONBIN_API_KEY_STORAGE, k); }
function saveBinId(id)       { localStorage.setItem(JSONBIN_BIN_ID_STORAGE, id); }
function saveShortCode(code) { localStorage.setItem(JSONBIN_SHORT_CODE_STORAGE, code); }

// ---- Short code helpers ----
// The short code IS the bin name — stored as "et-XK4P2M" on JSONBin.
// Anyone can fetch a public bin directly by its ID; the owner stores the bin ID locally
// and the short code is just a human-readable label derived from it.
//
// HOW IT WORKS:
//   Owner: pushes data → bin is named "et-XK4P2M" → bin ID saved locally → short code shown
//   Friend: enters "XK4-P2M" → we derive the bin name "et-XK4P2M" → search JSONBin by name
//           → get the bin ID → fetch data. No registry, no extra bin, works with code alone.

function genShortCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no 0/O/1/I
  let code = '';
  for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
  return code;
}

function formatShortCode(code) {
  if (code && code.length === 6) return code.slice(0, 3) + '-' + code.slice(3);
  return code || '';
}

function normaliseCode(input) {
  return input.replace(/[-\s]/g, '').toUpperCase().slice(0, 6);
}

function binNameFromCode(code) {
  return `et-${code}`; // e.g. "et-XK4P2M"
}

// Search JSONBin for a public bin by its exact name — no API key needed
async function findBinIdByName(name) {
  // JSONBin search endpoint: GET /v3/b?name=<name>&private=false
  const res = await fetch(`${JSONBIN_BASE}/b?name=${encodeURIComponent(name)}&private=false`, {
    headers: { 'X-JSON-Pretty': '0' }
  });
  if (!res.ok) throw new Error(`Search failed: HTTP ${res.status}`);
  const json = await res.json();
  // Response is an array of { record, metadata } or just metadata items
  const results = Array.isArray(json) ? json : (json.records || []);
  if (!results.length) throw new Error(`No data found for code "${formatShortCode(name.replace('et-',''))}". Make sure the owner has pushed their data.`);
  // Return the most recently updated bin
  results.sort((a, b) => {
    const ta = new Date((a.metadata || a).updatedAt || 0).getTime();
    const tb = new Date((b.metadata || b).updatedAt || 0).getTime();
    return tb - ta;
  });
  return (results[0].metadata || results[0]).id;
}

// Read short code from URL ?code=XK4P2M on first load
function getCodeFromUrl() {
  try { return new URLSearchParams(window.location.search).get('code') || ''; }
  catch { return ''; }
}

const _urlCode = getCodeFromUrl();

let state = {
  data: loadData(),
  screen: 'courses',
  activeCourseId: null,
  expandedSections: {},
  addingTopicFor: null,
  modal: null,
  // Sharing
  sharedData: null,
  sharedDataLoaded: false,
  sharedDataError: null,
  sharedBinId: getSavedBinId(),       // raw JSONBin ID (owner's device only)
  shortCode: getSavedShortCode(),     // 6-char code shown to users
  pendingCode: _urlCode,              // code from URL to auto-fetch on load
  apiKey: getSavedApiKey(),
  cloudSyncing: false,
  cloudFetching: false,
  bannerDismissed: false,
  lastPushedAt: localStorage.getItem('examTracker_lastPushed') || null,
};

// ---- Cloud fetch — friends only need the short code ----
async function fetchFromCloud(input) {
  if (!input) return;
  state.cloudFetching = true;
  state.sharedDataError = null;
  render();

  try {
    const norm = normaliseCode(input);
    const looksLikeRawBinId = /^[0-9a-f]{20,}$/i.test(input.trim());

    let binId;
    if (looksLikeRawBinId) {
      // Direct bin ID (owner refreshing, or legacy URL)
      binId = input.trim();
    } else {
      // Short code path — search by bin name
      const name = binNameFromCode(norm);
      binId = await findBinIdByName(name);
      state.shortCode = norm;
      saveShortCode(norm);
    }

    const res = await fetch(`${JSONBIN_BASE}/b/${binId}/latest`, {
      headers: { 'X-JSON-Pretty': '0' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const record = json.record || json;
    if (!record.courses) throw new Error('Not a valid exam tracker file');

    state.sharedData = record;
    state.sharedBinId = binId;
    saveBinId(binId);

    // Update URL cleanly — just the short code
    const url = new URL(window.location.href);
    if (state.shortCode) url.searchParams.set('code', state.shortCode);
    url.searchParams.delete('bin');
    url.searchParams.delete('r');
    url.hash = '';
    window.history.replaceState({}, '', url.toString());
  } catch(e) {
    state.sharedDataError = e.message || 'Failed to fetch';
    state.sharedData = null;
  }
  state.cloudFetching = false;
  state.sharedDataLoaded = true;
  state.pendingCode = '';
  render();
}

// ---- Cloud push (owner) ----
async function pushToCloud() {
  const apiKey = state.apiKey;
  if (!apiKey) { openModal({ type: 'setupCloud' }); return; }
  state.cloudSyncing = true;
  render();
  try {
    // Generate a short code once; keep it forever so the code stays stable
    if (!state.shortCode) {
      state.shortCode = genShortCode();
      saveShortCode(state.shortCode);
    }

    const existingBinId = state.sharedBinId;
    let binId = existingBinId;
    const payload = { ...state.data, _pushedAt: new Date().toISOString() };

    if (binId) {
      // Update existing bin
      const res = await fetch(`${JSONBIN_BASE}/b/${binId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Master-Key': apiKey },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`Update failed: HTTP ${res.status}`);
    } else {
      // Create new bin — name it with the short code so friends can search by name
      const res = await fetch(`${JSONBIN_BASE}/b`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': apiKey,
          'X-Bin-Name': binNameFromCode(state.shortCode),
          'X-Bin-Private': 'false',
        },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`Create failed: HTTP ${res.status}`);
      const data = await res.json();
      binId = data.metadata.id;
      state.sharedBinId = binId;
      saveBinId(binId);
    }

    state.lastPushedAt = new Date().toISOString();
    localStorage.setItem('examTracker_lastPushed', state.lastPushedAt);

    // Update URL — short code only, no registry param needed
    const url = new URL(window.location.href);
    url.searchParams.set('code', state.shortCode);
    url.searchParams.delete('bin');
    url.searchParams.delete('r');
    url.hash = '';
    window.history.replaceState({}, '', url.toString());

    showToast(`Pushed! Code: ${formatShortCode(state.shortCode)}`, 'green');
  } catch(e) {
    showToast('Push failed: ' + (e.message || 'Unknown error'), 'red');
  }
  state.cloudSyncing = false;
  render();
}

function getShareUrl() {
  if (!state.shortCode && !state.sharedBinId) return null;
  const url = new URL(window.location.href);
  url.searchParams.delete('bin');
  url.searchParams.delete('r');
  if (state.shortCode) {
    url.searchParams.set('code', state.shortCode);
  }
  url.hash = '';
  return url.toString();
}

function getShareCode() {
  return state.shortCode ? formatShortCode(state.shortCode) : null;
}

function copyShareCode() {
  const code = getShareCode();
  if (!code) return;
  navigator.clipboard.writeText(code).then(
    () => showToast(`Code copied: ${code}`, 'green'),
    () => showToast('Could not copy — copy manually', '')
  );
}

function copyShareUrl() {
  const url = getShareUrl();
  if (!url) return;
  navigator.clipboard.writeText(url).then(
    () => showToast('Share link copied!', 'green'),
    () => showToast('Could not copy — copy manually', '')
  );
}

function importSharedData() {
  if (!state.sharedData) return;
  openModal({ type: 'confirmImportShared' });
}

function downloadSharedJSON() {
  if (!state.sharedData) return;
  const json = JSON.stringify(state.sharedData, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'shared-exam-tracker.json';
  a.click();
  URL.revokeObjectURL(url);
  showToast('Downloaded!', 'green');
}

// ---- Mutations ----
function addCourse(name, code, years) {
  const c = { id: uid(), name, code, years: years.split(',').map(y=>y.trim()).filter(Boolean), sections: [] };
  state.data.courses.push(c);
  state.activeCourseId = c.id;
  saveData(state.data);
  state.screen = 'course-detail';
  render();
}
function deleteCourse(id) {
  state.data.courses = state.data.courses.filter(c => c.id !== id);
  if (state.activeCourseId === id) { state.activeCourseId = null; state.screen = 'courses'; }
  saveData(state.data); render();
}
function updateCourse(id, name, code, years) {
  const c = state.data.courses.find(c => c.id === id);
  if (!c) return;
  c.name = name; c.code = code; c.years = years.split(',').map(y=>y.trim()).filter(Boolean);
  saveData(state.data); render();
}
function addSection(courseId, name) {
  const c = state.data.courses.find(c => c.id === courseId);
  if (!c) return;
  const s = { id: uid(), name, topics: [] };
  c.sections.push(s);
  state.expandedSections[s.id] = true;
  saveData(state.data); render();
}
function deleteSection(courseId, sectionId) {
  const c = state.data.courses.find(c => c.id === courseId);
  if (!c) return;
  c.sections = c.sections.filter(s => s.id !== sectionId);
  saveData(state.data); render();
}
function renameSection(courseId, sectionId, name) {
  const c = state.data.courses.find(c => c.id === courseId);
  const s = c && c.sections.find(s => s.id === sectionId);
  if (s) s.name = name;
  saveData(state.data); render();
}
function addTopic(courseId, sectionId, name) {
  const c = state.data.courses.find(c => c.id === courseId);
  const s = c && c.sections.find(s => s.id === sectionId);
  if (!s) return;
  s.topics.push({ id: uid(), name, years: {} });
  saveData(state.data); render();
}
function deleteTopic(courseId, sectionId, topicId) {
  const c = state.data.courses.find(c => c.id === courseId);
  const s = c && c.sections.find(s => s.id === sectionId);
  if (!s) return;
  s.topics = s.topics.filter(t => t.id !== topicId);
  saveData(state.data); render();
}
function toggleYear(courseId, sectionId, topicId, year) {
  const c = state.data.courses.find(c => c.id === courseId);
  const s = c && c.sections.find(s => s.id === sectionId);
  const t = s && s.topics.find(t => t.id === topicId);
  if (!t) return;
  if (!t.years) t.years = {};
  t.years[year] = !t.years[year];
  saveData(state.data); render();
}

function openModal(m) { state.modal = m; render(); }
function closeModal() { state.modal = null; render(); }
function getActiveCourse() { return state.data.courses.find(c => c.id === state.activeCourseId) || null; }

// ---- Toast ----
let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  clearTimeout(toastTimer);
  t.textContent = msg;
  t.className = 'toast ' + type;
  requestAnimationFrame(() => { t.classList.add('show'); });
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}

// ---- el helper ----
function el(tag, attrs = {}, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'onclick') e.addEventListener('click', v);
    else if (k === 'oninput') e.addEventListener('input', v);
    else if (k === 'className') e.className = v;
    else e[k] = v;
  }
  for (const ch of children) {
    if (typeof ch === 'string') e.appendChild(document.createTextNode(ch));
    else if (ch) e.appendChild(ch);
  }
  return e;
}

// ---- Render ----
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const statusBar = el('div', { className: 'status-bar' });
  app.appendChild(statusBar);

  const header = renderHeader();
  app.appendChild(header);

  // Screens
  const coursesScreen = el('div', { className: 'screen' + (state.screen === 'courses' ? ' active' : '') });
  coursesScreen.appendChild(renderCoursesScreen());
  app.appendChild(coursesScreen);

  const detailScreen = el('div', { className: 'screen' + (state.screen === 'course-detail' ? ' active' : '') });
  if (state.screen === 'course-detail') detailScreen.appendChild(renderCourseDetailScreen());
  app.appendChild(detailScreen);

  const checklistScreen = el('div', { className: 'screen' + (state.screen === 'checklist' ? ' active' : '') });
  checklistScreen.appendChild(renderChecklistScreen());
  app.appendChild(checklistScreen);

  const ieScreen = el('div', { className: 'screen' + (state.screen === 'import-export' ? ' active' : '') });
  ieScreen.appendChild(renderImportExportScreen());
  app.appendChild(ieScreen);

  // Bottom nav (only when not in course detail)
  if (state.screen !== 'course-detail') {
    app.appendChild(renderBottomNav());
  }

  // Modal
  if (state.modal) app.appendChild(renderModal());

  // FAB for courses screen
  if (state.screen === 'courses') {
    const fab = el('button', {
      className: 'fab',
      onclick: () => openModal({ type: 'addCourse' })
    }, '+');
    app.appendChild(fab);
  }
}

function renderHeader() {
  const header = el('div', { className: 'app-header' });
  const left = el('div', { className: 'header-left' });
  const right = el('div', { className: 'header-right' });

  if (state.screen === 'course-detail') {
    const course = getActiveCourse();
    const back = el('button', {
      className: 'btn-back',
      onclick: () => { state.screen = 'courses'; render(); }
    }, '‹ Courses');
    left.appendChild(back);
    if (course) {
      const title = el('div', { className: 'app-title' });
      title.textContent = course.code || course.name;
      left.appendChild(title);
      const editBtn = el('button', {
        className: 'btn-header-icon',
        onclick: () => openModal({ type: 'editCourse', course })
      }, '✎');
      right.appendChild(editBtn);
    }
  } else {
    const title = el('div', { className: 'app-title' });
    const span = el('span', {}, 'Exam');
    title.appendChild(span);
    title.appendChild(document.createTextNode(' Tracker'));
    left.appendChild(title);

    if (state.screen === 'checklist' && state.activeCourseId) {
      const course = getActiveCourse();
      if (course) {
        const sub = el('div', { style: 'font-size:0.72rem;opacity:0.6;font-family:DM Mono,monospace;' });
        sub.textContent = course.code || '';
        left.appendChild(sub);
      }
    }
  }

  header.appendChild(left);
  header.appendChild(right);
  return header;
}

function renderBottomNav() {
  const nav = el('div', { className: 'bottom-nav' });
  const tabs = [
    { id: 'courses', icon: '📚', label: 'Courses' },
    { id: 'checklist', icon: '✅', label: 'Checklist' },
    { id: 'import-export', icon: '↕️', label: 'Data' },
  ];
  for (const tab of tabs) {
    const t = el('button', {
      className: 'nav-tab' + (state.screen === tab.id ? ' active' : ''),
      onclick: () => { state.screen = tab.id; render(); }
    });
    t.appendChild(el('span', { className: 'nav-icon' }, tab.icon));
    t.appendChild(el('span', { className: 'nav-label' }, tab.label));
    nav.appendChild(t);
  }
  return nav;
}

// ---- COURSES SCREEN ----
function renderCoursesScreen() {
  const wrap = el('div', {});

  // Shared data banner — shown when a bin is loaded and friends can see it
  if (state.sharedData && !state.bannerDismissed) {
    const count = state.sharedData.courses.length;
    const banner = el('div', { className: 'shared-banner' });
    banner.appendChild(el('div', { className: 'shared-banner-icon' }, '☁️'));
    const txt = el('div', { className: 'shared-banner-text' });
    txt.appendChild(el('div', { className: 'shared-banner-title' }, 'Shared data available'));
    txt.appendChild(el('div', { className: 'shared-banner-sub' }, `${count} course${count !== 1 ? 's' : ''} · tap to import or download`));
    banner.appendChild(txt);
    const btns = el('div', { className: 'shared-banner-actions' });
    btns.appendChild(el('button', {
      className: 'btn-banner btn-banner-primary',
      onclick: (e) => { e.stopPropagation(); state.screen = 'import-export'; render(); }
    }, 'View'));
    banner.appendChild(btns);
    banner.appendChild(el('button', {
      className: 'btn-banner-dismiss',
      onclick: (e) => { e.stopPropagation(); state.bannerDismissed = true; render(); }
    }, '✕'));
    wrap.appendChild(banner);
  }

  if (state.data.courses.length === 0) {
    const emp = el('div', { className: 'empty-courses' });
    emp.appendChild(el('div', { className: 'empty-icon' }, '📖'));
    emp.appendChild(el('h3', {}, 'No courses yet'));
    emp.appendChild(el('p', {}, 'Tap the + button below to add your first exam course and start tracking topics.'));
    wrap.appendChild(emp);
  } else {
    const list = el('div', { className: 'course-list' });
    for (const course of state.data.courses) {
      list.appendChild(renderCourseCard(course));
    }
    wrap.appendChild(list);
  }
  return wrap;
}

function renderCourseCard(course) {
  let totalTopics = 0, coveredTopics = 0;
  course.sections.forEach(s => {
    s.topics.forEach(t => {
      totalTopics++;
      if (course.years.some(y => t.years && t.years[y])) coveredTopics++;
    });
  });
  const pct = totalTopics > 0 ? Math.round(coveredTopics / totalTopics * 100) : 0;

  const card = el('div', { className: 'course-card' });

  const body = el('div', {
    className: 'course-card-body',
    onclick: () => {
      state.activeCourseId = course.id;
      state.screen = 'course-detail';
      render();
    }
  });
  body.appendChild(el('div', { className: 'course-badge' }, course.code || '—'));
  const info = el('div', { className: 'course-info' });
  info.appendChild(el('div', { className: 'course-name' }, course.name));
  info.appendChild(el('div', { className: 'course-meta' }, `${course.sections.length} section${course.sections.length !== 1 ? 's' : ''} · ${totalTopics} topics · ${course.years.length} year${course.years.length !== 1 ? 's' : ''}`));
  body.appendChild(info);
  body.appendChild(el('div', { className: 'course-chevron' }, '›'));
  card.appendChild(body);

  if (totalTopics > 0) {
    const prog = el('div', { className: 'course-card-progress' });
    const pbw = el('div', { className: 'mini-progress-bar-wrap' });
    pbw.appendChild(el('div', { className: 'mini-progress-bar', style: `width:${pct}%` }));

  }

  const actions = el('div', { className: 'course-card-actions' });
  const checkBtn = el('button', {
    className: 'btn-card-action',

    className: 'btn-card-action',

  }, '✎ Edit');

// ---- COURSE DETAIL SCREEN ----
function renderCourseDetailScreen() {
  const course = getActiveCourse();
  if (!course) return el('div', {}, 'Course not found.');

  let totalTopics = 0, coveredTopics = 0;
  course.sections.forEach(s => {
    s.topics.forEach(t => {
      totalTopics++;
      if (course.years.some(y => t.years && t.years[y])) coveredTopics++;
    });
  });
  const pct = totalTopics > 0 ? Math.round(coveredTopics / totalTopics * 100) : 0;

  const wrap = el('div', { className: 'course-detail-screen' });

  // Gradient header
  const dh = el('div', { className: 'course-detail-header' });
  dh.appendChild(el('div', { className: 'course-detail-name' }, course.name));
  dh.appendChild(el('div', { className: 'course-detail-sub' }, (course.code || '') + (course.years.length ? ' · ' + course.years.join(', ') : '')));

  const statsRow = el('div', { className: 'stats-row' });
  const s1 = el('div', { className: 'stat-pill' });
  s1.appendChild(el('div', { className: 'stat-pill-label' }, 'Sections'));
  s1.appendChild(el('div', { className: 'stat-pill-value' }, String(course.sections.length)));
  const s2 = el('div', { className: 'stat-pill' });
  s2.appendChild(el('div', { className: 'stat-pill-label' }, 'Topics'));
  s2.appendChild(el('div', { className: 'stat-pill-value' }, String(totalTopics)));
  const s3 = el('div', { className: 'stat-pill' });
  s3.appendChild(el('div', { className: 'stat-pill-label' }, 'Covered'));
  s3.appendChild(el('div', { className: 'stat-pill-value green' }, String(pct) + '%'));
  statsRow.appendChild(s1); statsRow.appendChild(s2); statsRow.appendChild(s3);
  dh.appendChild(statsRow);
  wrap.appendChild(dh);

  // Sections
  const container = el('div', { className: 'sections-container' });

    const emp = el('div', { style: 'text-align:center;padding:2rem 1rem;color:var(--ink-light);font-size:.875rem;' });
    emp.textContent = 'No sections yet. Add one below.';
    container.appendChild(emp);
  }

  course.sections.forEach((section, idx) => {
    container.appendChild(renderSectionBlock(course, section, idx));
  });

  // Add section button
  container.appendChild(el('button', {
    className: 'add-section-btn',
    onclick: () => openModal({ type: 'addSection', courseId: course.id })
  }, '+ Add Section'));

  wrap.appendChild(container);
  return wrap;
}

function renderSectionBlock(course, section, idx) {
  const expanded = state.expandedSections[section.id] !== false;
  const secTotal = section.topics.length;
  const secCovered = section.topics.filter(t => course.years.some(y => t.years && t.years[y])).length;
  const pct = secTotal > 0 ? Math.round(secCovered / secTotal * 100) : 0;

  const block = el('div', { className: 'section-block' });

  // Head
  const head = el('div', {
    className: 'section-head',
    onclick: () => {
      state.expandedSections[section.id] = !expanded;
      render();
    }
  });
  head.appendChild(el('span', { className: 'section-num' }, String(idx + 1)));
  head.appendChild(el('span', { className: 'section-name-text' }, section.name));

  if (secTotal > 0) {
    const prog = el('div', { className: 'section-progress-mini' });
    const pbw = el('div', { className: 'mini-progress-bar-wrap', style: 'max-width:50px;' });
    const inner = el('div', { className: 'mini-progress-bar dark', style: `width:${pct}%` });
    pbw.appendChild(inner);
    prog.appendChild(pbw);
    prog.appendChild(el('span', { className: 'mini-progress-text dark', style: 'color:var(--ink-light);' }, `${secCovered}/${secTotal}`));
    head.appendChild(prog);
  }
  head.appendChild(el('span', { className: 'section-toggle' }, expanded ? '▲' : '▼'));
  block.appendChild(head);

  if (expanded) {
    // Action bar
    const bar = el('div', { className: 'section-actions-bar' });
    bar.appendChild(el('button', {
      className: 'btn-section-action',
      onclick: (e) => { e.stopPropagation(); openModal({ type: 'renameSection', courseId: course.id, section }); }
    }, '✎ Rename'));
    bar.appendChild(el('button', {
      className: 'btn-section-action danger',
      onclick: (e) => { e.stopPropagation(); openModal({ type: 'deleteSection', courseId: course.id, sectionId: section.id, name: section.name }); }
    }, '🗑 Delete'));
    block.appendChild(bar);

    // Topics
    const topicList = el('div', { className: 'topic-list' });
    if (section.topics.length === 0) {
      const noT = el('div', { style: 'padding:.75rem 1.15rem;color:var(--ink-light);font-size:.82rem;' });
      noT.textContent = 'No topics yet. Add one below.';
      topicList.appendChild(noT);
    }
    section.topics.forEach(topic => {
      const row = el('div', { className: 'topic-row' });
      row.appendChild(el('span', { className: 'topic-name-text' }, topic.name));
      // Delete on long press via context
      block.addEventListener('contextmenu', (e) => e.preventDefault());
      const pills = el('div', { className: 'year-pills' });
      course.years.forEach(year => {
        const checked = topic.years && topic.years[year];
        const pill = el('span', {
          className: 'year-pill' + (checked ? ' checked' : ''),
          onclick: () => toggleYear(course.id, section.id, topic.id, year)
        }, year);
        pills.appendChild(pill);
      });
      row.appendChild(pills);
      topicList.appendChild(row);
    });

    // Add topic inline
    if (state.addingTopicFor === section.id) {
      const addRow = el('div', { className: 'add-topic-row' });
      const inp = el('input', {
        className: 'add-topic-input',
        type: 'text',
        placeholder: 'Topic name…'
      });
      const confirm = el('button', {
        className: 'btn-confirm-add',
        onclick: () => {
          if (inp.value.trim()) {
            addTopic(course.id, section.id, inp.value.trim());
          }
          state.addingTopicFor = null;
          render();
        }
      }, 'Add');
      const cancel = el('button', {
        className: 'btn-cancel-add',
        onclick: () => { state.addingTopicFor = null; render(); }
      }, '✕');
      addRow.appendChild(inp);
      addRow.appendChild(confirm);
      addRow.appendChild(cancel);
      topicList.appendChild(addRow);
      setTimeout(() => inp.focus(), 60);
    } else {
      const addBtn = el('div', { className: 'add-topic-row', style: 'cursor:pointer;' });
      const addLabel = el('span', { style: 'color:var(--teal);font-size:.82rem;font-weight:600;' }, '+ Add Topic');
      addBtn.addEventListener('click', () => { state.addingTopicFor = section.id; render(); });
      addBtn.appendChild(addLabel);
      topicList.appendChild(addBtn);
    }

    block.appendChild(topicList);
  }

  return block;
}

// ---- CHECKLIST SCREEN ----

  const container = el('div', { style: 'padding:0 1rem 5rem;' });
  course.sections.forEach((section, idx) => {

    const secTotal = section.topics.length;
    const secCovered = section.topics.filter(t => course.years.some(y => t.years && t.years[y])).length;

    const block = el('div', { className: 'section-block' });
    const head = el('div', {
      className: 'section-head',
      onclick: () => { state.expandedSections[section.id] = !expanded; render(); }
    });
    head.appendChild(el('span', { className: 'section-num' }, String(idx + 1)));
    head.appendChild(el('span', { className: 'section-name-text' }, section.name));
    if (secTotal > 0) {
      const prog = el('div', { className: 'section-progress-mini' });
      const pbw = el('div', { className: 'mini-progress-bar-wrap', style: 'max-width:60px;' });
      pbw.appendChild(el('div', { className: 'mini-progress-bar dark', style: `width:${pct}%` }));
      prog.appendChild(pbw);
      prog.appendChild(el('span', { style: 'font-size:.68rem;font-family:DM Mono,monospace;color:var(--ink-light);' }, `${secCovered}/${secTotal}`));
      head.appendChild(prog);
    }
    head.appendChild(el('span', { className: 'section-toggle' }, expanded ? '▲' : '▼'));
    block.appendChild(head);

    if (expanded) {
      const topicList = el('div', { className: 'topic-list' });
      if (section.topics.length === 0) {
        topicList.appendChild(el('div', { style: 'padding:.75rem 1.15rem;color:var(--ink-light);font-size:.82rem;' }, 'No topics in this section.'));
      }
      section.topics.forEach(topic => {
        const row = el('div', { className: 'topic-row' });
        row.appendChild(el('span', { className: 'topic-name-text' }, topic.name));
        const pills = el('div', { className: 'year-pills' });
        course.years.forEach(year => {
          const checked = topic.years && topic.years[year];
          const pill = el('span', {
            className: 'year-pill' + (checked ? ' checked' : ''),
            onclick: () => toggleYear(course.id, section.id, topic.id, year)
          }, year);
          pills.appendChild(pill);
        });
        row.appendChild(pills);
        topicList.appendChild(row);
      });
      block.appendChild(topicList);
    }
    container.appendChild(block);
  });
  wrap.appendChild(container);
  return wrap;
}

  const fileRow = el('div', {
    className: 'ie-row',
    onclick: () => {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = '.json,application/json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if (!parsed.courses) throw new Error('Invalid format');
            state.data = parsed;
            saveData(state.data);
            render();
            showToast('Imported successfully!', 'green');

  const fileText = el('div', { className: 'ie-row-text' });
  fileText.appendChild(el('div', { className: 'ie-row-title' }, 'Import from File'));
  fileText.appendChild(el('div', { className: 'ie-row-desc' }, 'Pick a JSON file from your device'));
  fileRow.appendChild(fileText);
  fileRow.appendChild(el('div', { className: 'ie-row-chevron' }, '›'));
  importCard.appendChild(fileRow);
  wrap.appendChild(importCard);

  // ════ DANGER ════
  wrap.appendChild(el('div', { className: 'ie-section-title' }, 'Danger Zone'));
  const dangerCard = el('div', { className: 'ie-card' });
  const clearRow = el('div', {
    className: 'ie-row',
    style: 'color:var(--accent);',
    onclick: () => openModal({ type: 'clearAll' })
  });
  clearRow.appendChild(el('div', { className: 'ie-row-icon' }, '🗑️'));
  const clearText = el('div', { className: 'ie-row-text' });
  clearText.appendChild(el('div', { className: 'ie-row-title', style: 'color:var(--accent);' }, 'Clear All Data'));
  clearText.appendChild(el('div', { className: 'ie-row-desc' }, 'Permanently delete everything'));
  clearRow.appendChild(clearText);
  dangerCard.appendChild(clearRow);
  wrap.appendChild(dangerCard);

  return wrap;
}

// ---- MODALS ----
function renderModal() {
  const overlay = el('div', {
    className: 'modal-overlay',
    onclick: (e) => { if (e.target === overlay) closeModal(); }
  });
  const sheet = el('div', { className: 'modal-sheet' });
  sheet.appendChild(el('div', { className: 'modal-handle' }));

  const m = state.modal;

  if (m.type === 'addCourse') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Add Course'));
    const nameInput = el('input', { className: 'form-input', type: 'text', placeholder: 'e.g. OCR GCSE Computer Science J277' });
    const codeInput = el('input', { className: 'form-input', type: 'text', placeholder: 'e.g. J277' });
    const yearsInput = el('input', { className: 'form-input', type: 'text', placeholder: 'e.g. 2019, 2020, 2021, 2022, 2023' });

    const g1 = el('div', { className: 'form-group' });
    g1.appendChild(el('label', { className: 'form-label' }, 'Course Name')); g1.appendChild(nameInput);
    const g2 = el('div', { className: 'form-group' });
    g2.appendChild(el('label', { className: 'form-label' }, 'Short Code')); g2.appendChild(codeInput);
    const g3 = el('div', { className: 'form-group' });
    g3.appendChild(el('label', { className: 'form-label' }, 'Exam Years'));
    g3.appendChild(yearsInput);
    g3.appendChild(el('div', { className: 'form-hint' }, 'Comma-separated list of years'));
    sheet.appendChild(g1); sheet.appendChild(g2); sheet.appendChild(g3);

    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      if (!nameInput.value.trim()) return;
      addCourse(nameInput.value.trim(), codeInput.value.trim(), yearsInput.value);
      closeModal();
    }}, 'Create Course'));
    sheet.appendChild(actions);
    setTimeout(() => nameInput.focus(), 100);
  }

  else if (m.type === 'editCourse') {
    const c = m.course;
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Edit Course'));
    const nameInput = el('input', { className: 'form-input', type: 'text', value: c.name });
    const codeInput = el('input', { className: 'form-input', type: 'text', value: c.code || '' });
    const yearsInput = el('input', { className: 'form-input', type: 'text', value: c.years.join(', ') });

    const g1 = el('div', { className: 'form-group' });
    g1.appendChild(el('label', { className: 'form-label' }, 'Course Name')); g1.appendChild(nameInput);
    const g2 = el('div', { className: 'form-group' });
    g2.appendChild(el('label', { className: 'form-label' }, 'Short Code')); g2.appendChild(codeInput);
    const g3 = el('div', { className: 'form-group' });
    g3.appendChild(el('label', { className: 'form-label' }, 'Exam Years'));
    g3.appendChild(yearsInput);
    g3.appendChild(el('div', { className: 'form-hint' }, 'Comma-separated. Changing these affects checklist ticks.'));
    sheet.appendChild(g1); sheet.appendChild(g2); sheet.appendChild(g3);

    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      updateCourse(c.id, nameInput.value.trim(), codeInput.value.trim(), yearsInput.value);
      closeModal();
    }}, 'Save'));
    sheet.appendChild(actions);
  }

  else if (m.type === 'deleteCourse') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Delete Course'));
    sheet.appendChild(el('p', { style: 'color:var(--ink-mid);margin-bottom:1rem;font-size:.9rem;' },
      `Delete "${m.course.name}"? All sections and topics will be permanently removed.`));
    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-danger', onclick: () => {
      deleteCourse(m.course.id); closeModal();
    }}, 'Delete'));
    sheet.appendChild(actions);
  }

  else if (m.type === 'addSection') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Add Section'));
    const input = el('input', { className: 'form-input', type: 'text', placeholder: 'e.g. 1.1 Systems Architecture' });
    const g = el('div', { className: 'form-group' });
    g.appendChild(el('label', { className: 'form-label' }, 'Section Name')); g.appendChild(input);
    sheet.appendChild(g);
    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      if (!input.value.trim()) return;
      addSection(m.courseId, input.value.trim()); closeModal();
    }}, 'Add Section'));
    sheet.appendChild(actions);
    setTimeout(() => input.focus(), 100);
  }

  else if (m.type === 'renameSection') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Rename Section'));
    const input = el('input', { className: 'form-input', type: 'text', value: m.section.name });
    const g = el('div', { className: 'form-group' });
    g.appendChild(el('label', { className: 'form-label' }, 'Section Name')); g.appendChild(input);
    sheet.appendChild(g);
    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      if (!input.value.trim()) return;
      renameSection(m.courseId, m.section.id, input.value.trim()); closeModal();
    }}, 'Save'));
    sheet.appendChild(actions);
    setTimeout(() => input.focus(), 100);
  }

  else if (m.type === 'deleteSection') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Delete Section'));
    sheet.appendChild(el('p', { style: 'color:var(--ink-mid);margin-bottom:1rem;font-size:.9rem;' },
      `Delete "${m.name}"? All topics inside will also be deleted.`));
    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-danger', onclick: () => {
      deleteSection(m.courseId, m.sectionId); closeModal();
    }}, 'Delete'));
    sheet.appendChild(actions);
  }

  else if (m.type === 'importJSON') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Import JSON'));
    const ta = el('textarea', { className: 'import-textarea', placeholder: 'Paste JSON backup here…' });
    const g = el('div', { className: 'form-group' });
    g.appendChild(el('label', { className: 'form-label' }, 'JSON Data')); g.appendChild(ta);
    sheet.appendChild(g);
    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      try {
        const parsed = JSON.parse(ta.value);
        if (!parsed.courses) throw new Error('Invalid');
        state.data = parsed;
        saveData(state.data);
        closeModal();
        showToast('Imported successfully!', 'green');
        render();
      } catch { showToast('Invalid JSON', 'red'); }
    }}, 'Import'));
    sheet.appendChild(actions);
  }

  else if (m.type === 'clearAll') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Clear All Data'));
    sheet.appendChild(el('p', { style: 'color:var(--ink-mid);margin-bottom:1rem;font-size:.9rem;' },
      'This will permanently delete all courses, sections, and topics. This cannot be undone. Consider exporting first.'));
    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-danger', onclick: () => {
      state.data = { courses: [] };
      state.activeCourseId = null;
      saveData(state.data);
      closeModal();
      showToast('All data cleared', 'red');
    }}, 'Clear Everything'));
    sheet.appendChild(actions);
  }

  else if (m.type === 'confirmImportShared') {
    const sd = state.sharedData;
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Import Shared Data'));
    sheet.appendChild(el('p', { style: 'color:var(--ink-mid);margin-bottom:0.5rem;font-size:.9rem;' },
      `This will replace your current data with the shared file (${sd.courses.length} course${sd.courses.length !== 1 ? 's' : ''}). Your existing data will be overwritten.`));
    sheet.appendChild(el('p', { style: 'color:var(--ink-light);margin-bottom:1rem;font-size:.8rem;' },
      'Tip: Export your current data first if you want to keep it.'));
    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      state.data = { courses: sd.courses };
      saveData(state.data);
      closeModal();
      showToast('Shared data imported!', 'green');
      render();
    }}, 'Import & Replace'));
    sheet.appendChild(actions);
  }

  else if (m.type === 'setupCloud') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Cloud Setup'));

    // Instructions
    const infoBox = el('div', { style: 'background:var(--teal-light);border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.8rem;color:var(--teal);line-height:1.5;' });
    infoBox.innerHTML = '1. Go to <strong>jsonbin.io</strong> and create a free account.<br>2. Copy your <strong>Master Key</strong> from the API Keys section.<br>3. Paste it below — only you need this key.<br>4. After pushing, you\'ll get a short <strong>6-letter share code</strong> to give friends.';
    sheet.appendChild(infoBox);

    const apiInput = el('input', { className: 'form-input', type: 'password', placeholder: '$2b$10$…', value: state.apiKey });
    const gApi = el('div', { className: 'form-group' });
    gApi.appendChild(el('label', { className: 'form-label' }, 'JSONBin Master Key'));
    gApi.appendChild(apiInput);
    gApi.appendChild(el('div', { className: 'form-hint' }, 'Stored locally on your device only'));
    sheet.appendChild(gApi);

    if (state.shortCode) {
      const codeBox = el('div', { style: 'background:var(--gold-light);border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;font-size:.8rem;color:var(--gold);line-height:1.5;' });
      codeBox.innerHTML = `Your share code: <strong style="font-family:DM Mono,monospace;letter-spacing:0.1em;font-size:1rem;">${formatShortCode(state.shortCode)}</strong>`;
      sheet.appendChild(codeBox);
    }

    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      const key = apiInput.value.trim();
      if (!key) { showToast('Enter your API key', 'red'); return; }
      state.apiKey = key;
      saveApiKey(key);
      closeModal();
      showToast('Cloud configured ✓', 'green');
      render();
    }}, 'Save'));
    sheet.appendChild(actions);
    setTimeout(() => apiInput.focus(), 100);
  }

  else if (m.type === 'enterShareCode') {
    sheet.appendChild(el('div', { className: 'modal-title' }, 'Fetch Shared Data'));
    sheet.appendChild(el('p', { style: 'color:var(--ink-mid);margin-bottom:1rem;font-size:.9rem;' },
      'Ask your friend for their 6-character share code (e.g. XK4-P2M) or paste their share link.'));

    const codeInput = el('input', { className: 'form-input', type: 'text', placeholder: 'e.g. XK4-P2M', style: 'font-family:DM Mono,monospace;font-size:1.1rem;letter-spacing:0.1em;text-transform:uppercase;' });
    // Auto-format as user types
    codeInput.addEventListener('input', () => {
      let v = codeInput.value.replace(/[-\s]/g, '').toUpperCase().slice(0, 6);
      if (v.length > 3) v = v.slice(0, 3) + '-' + v.slice(3);
      codeInput.value = v;
    });
    const g = el('div', { className: 'form-group' });
    g.appendChild(el('label', { className: 'form-label' }, 'Share Code or Link'));
    g.appendChild(codeInput);
    g.appendChild(el('div', { className: 'form-hint' }, 'Codes look like XK4-P2M · Links contain ?code= and ?r='));
    sheet.appendChild(g);

    const actions = el('div', { className: 'modal-actions' });
    actions.appendChild(el('button', { className: 'btn btn-ghost', onclick: closeModal }, 'Cancel'));
    actions.appendChild(el('button', { className: 'btn btn-primary', onclick: () => {
      let val = codeInput.value.trim();
      // Accept full URLs — extract code= param; also accept legacy ?bin= URLs
      try {
        const u = new URL(val);
        const codeParam = u.searchParams.get('code');
        const binParam  = u.searchParams.get('bin');
        if (codeParam) val = codeParam;
        else if (binParam) val = binParam;
      } catch {}
      if (!val) return;
      closeModal();
      fetchFromCloud(normaliseCode(val) || val);
    }}, 'Fetch'));
    sheet.appendChild(actions);
    setTimeout(() => codeInput.focus(), 100);
  }

  overlay.appendChild(sheet);
  return overlay;
}

render();

// Auto-fetch on load: if a code was in the URL, fetch it; otherwise refresh saved bin
if (state.pendingCode) {
  fetchFromCloud(state.pendingCode);
} else if (state.sharedBinId && !state.shortCode) {
  // Legacy: had a bin ID but no short code saved — just fetch by ID directly
  (async () => {
    state.cloudFetching = true; render();
    try {
      const res = await fetch(`${JSONBIN_BASE}/b/${state.sharedBinId}/latest`, { headers: { 'X-JSON-Pretty': '0' } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const record = json.record || json;
      if (record.courses) { state.sharedData = record; }
    } catch(e) { state.sharedDataError = e.message; }
    state.cloudFetching = false; state.sharedDataLoaded = true; render();
  })();
}
</script>
</body>
</html>
